<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Snake</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d12;
        color: #f5f7fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #game {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 16px;
        width: 100%;
        max-width: min(90vw, 520px);
      }
      #score {
        font-size: 1.1rem;
        font-weight: 600;
        color: #9aa3b2;
      }
      canvas {
        width: 100%;
        aspect-ratio: 1 / 1;
        background: #151922;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        touch-action: none;
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(11, 13, 18, 0.92);
        text-align: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }
      #overlay h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      #overlay p {
        margin: 0;
        color: #9aa3b2;
      }
      #overlay button {
        padding: 12px 24px;
        border: 0;
        border-radius: 999px;
        background: #7c3aed;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      #overlay button:hover {
        background: #6d28d9;
      }
      #hint {
        font-size: 0.85rem;
        color: #9aa3b2;
        text-align: center;
      }
      .wrapper {
        position: relative;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div id="score">Puntuación: 0</div>
      <div class="wrapper">
        <canvas id="board" width="400" height="400"></canvas>
        <div id="overlay" class="visible">
          <h1>Retro Snake</h1>
          <p>Usa las flechas o desliza para moverte.</p>
          <button id="start" type="button">Jugar</button>
        </div>
      </div>
      <div id="hint">Come manzanas 🍎 y evita chocar contigo mismo.</div>
    </div>

    <script>
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const overlay = document.getElementById("overlay");
      const startBtn = document.getElementById("start");

      const GRID = 20;
      const TILE = canvas.width / GRID;
      const TICK_MS = 120;

      let snake = [];
      let direction = { x: 1, y: 0 };
      let nextDirection = { x: 1, y: 0 };
      let apple = { x: 0, y: 0 };
      let score = 0;
      let timer = null;
      let running = false;

      function randomTile() {
        return {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID),
        };
      }

      function placeApple() {
        do {
          apple = randomTile();
        } while (snake.some((s) => s.x === apple.x && s.y === apple.y));
      }

      function reset() {
        snake = [
          { x: 5, y: 10 },
          { x: 4, y: 10 },
          { x: 3, y: 10 },
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        scoreEl.textContent = `Puntuación: ${score}`;
        placeApple();
        running = true;
        overlay.classList.remove("visible");
        if (timer) clearInterval(timer);
        timer = setInterval(tick, TICK_MS);
        draw();
      }

      function gameOver() {
        running = false;
        clearInterval(timer);
        overlay.querySelector("h1").textContent = "¡Game Over!";
        overlay.querySelector("p").textContent = `Puntuación final: ${score}`;
        startBtn.textContent = "Reintentar";
        overlay.classList.add("visible");
      }

      function tick() {
        direction = nextDirection;
        const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

        if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
          gameOver();
          return;
        }

        if (snake.some((s) => s.x === head.x && s.y === head.y)) {
          gameOver();
          return;
        }

        snake.unshift(head);

        if (head.x === apple.x && head.y === apple.y) {
          score += 10;
          scoreEl.textContent = `Puntuación: ${score}`;
          placeApple();
        } else {
          snake.pop();
        }

        draw();
      }

      function draw() {
        ctx.fillStyle = "#151922";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(
          apple.x * TILE + TILE / 2,
          apple.y * TILE + TILE / 2,
          TILE / 2 - 2,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.fillStyle = "#10b981";
        snake.forEach((s, i) => {
          ctx.globalAlpha = i === 0 ? 1 : 0.8;
          ctx.fillRect(s.x * TILE + 1, s.y * TILE + 1, TILE - 2, TILE - 2);
        });
        ctx.globalAlpha = 1;
      }

      function setDir(x, y) {
        if (!running) return;
        if (x !== 0 && direction.x !== 0) return;
        if (y !== 0 && direction.y !== 0) return;
        nextDirection = { x, y };
      }

      document.addEventListener("keydown", (e) => {
        switch (e.key) {
          case "ArrowUp":
          case "w":
          case "W":
            setDir(0, -1);
            break;
          case "ArrowDown":
          case "s":
          case "S":
            setDir(0, 1);
            break;
          case "ArrowLeft":
          case "a":
          case "A":
            setDir(-1, 0);
            break;
          case "ArrowRight":
          case "d":
          case "D":
            setDir(1, 0);
            break;
        }
      });

      let touchStart = null;
      canvas.addEventListener("touchstart", (e) => {
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      });
      canvas.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });
      canvas.addEventListener("touchend", (e) => {
        if (!touchStart) return;
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;
        if (Math.abs(dx) > Math.abs(dy)) {
          setDir(dx > 0 ? 1 : -1, 0);
        } else {
          setDir(0, dy > 0 ? 1 : -1);
        }
        touchStart = null;
      });

      startBtn.addEventListener("click", reset);
    </script>
  </body>
</html>
