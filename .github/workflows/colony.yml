name: 🐜 Ants Colony

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      name:
        description: 'Ant name (e.g., carol, uma)'
        required: true
        type: string
      model:
        description: 'AI model to use'
        required: false
        type: string
        default: 'opencode-go/kimi-k2.7-code'

jobs:
  build-image:
    name: 🏗️ Build Ant Body
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 🕳️ Checkout
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .ants
          file: .ants/body
          push: true
          tags: ghcr.io/${{ github.repository }}/ant-body:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  working:
    name: 🐜 Ant Mission
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      contents: write
      packages: read
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: 🕳️ Descending into the Anthill
        uses: actions/checkout@v6

      - name: 🆔 Pheromone Identification
        id: identify
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AGENT_NAME="${{ github.event.inputs.name }}"
            echo "AGENT=$AGENT_NAME" >> $GITHUB_ENV
            echo "📢 Direct call for ant: $AGENT_NAME"
          else
            AUTHOR_NAME=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[-1].commit.author.name')
            if [[ "$AUTHOR_NAME" =~ 🐜\ (.+) ]]; then
              echo "AGENT=${BASH_REMATCH[1]}" >> $GITHUB_ENV
              echo "🧬 DNA detected: Ant ${BASH_REMATCH[1]}"
            else
              echo "❌ Intruder detected: Author format must be '🐜 [NAME]'"
              exit 1
            fi
          fi

      - name: 🛡️ Territory Inspection (PR Limit)
        shell: bash
        run: |
          ANT="${{ env.AGENT }}"
          OPEN_PRS=$(gh pr list --state open --repo ${{ github.repository }} --search "author:🐜 $ANT" --json number --jq '. | length')
          if [ "$OPEN_PRS" -ge 2 ]; then
            echo "🚨 Tunnel saturation: $ANT already has $OPEN_PRS active missions."
            exit 1
          fi

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 🐜 Awakening the Drone
        run: |
          docker run --rm \
            -e ANT="${{ env.AGENT }}" \
            -e ANTS_MODEL="${{ github.event.inputs.model || 'opencode-go/kimi-k2.7-code' }}" \
            -e REPOSITORY="${{ github.repository }}" \
            -e BRANCH="main" \
            -e EMAIL="${{ env.AGENT }}@ants.io" \
            -e GH_TOKEN="${{ github.token }}" \
            -e OPENCODE_API_KEY="${{ secrets.OPENCODE_API_KEY }}" \
            -e BRAVE_API_KEY="${{ secrets.BRAVE_API_KEY }}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/${{ github.repository }}/ant-body:latest

      - name: 📋 Job Summary
        if: always()
        run: |
          echo "## 🐜 Ant Mission Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Agent:** ${{ env.AGENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** ${{ github.event.inputs.model || 'opencode-go/kimi-k2.7-code' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "- Runner: \`${{ runner.os }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace: \`${{ github.workspace }}\`" >> $GITHUB_STEP_SUMMARY

      - name: 🏁 Mission Accomplished
        run: echo "🍂 Collection finished for ${{ env.AGENT }}."
