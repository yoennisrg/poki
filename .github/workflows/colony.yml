name: 🐜 Ants Colony

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      name:
        description: 'Ant name (e.g., carol, uma)'
        required: true
        type: string
      model:
        description: 'AI model to use'
        required: false
        type: string
        default: 'opencode-go/kimi-k2.7-code'

env:
  ANT_SEQUENCE: uma,carol,piper,kael,atlas,fiona,nova,vesper,echo,lyra

jobs:
  build-image:
    name: 🏗️ Build Ant Body
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 🕳️ Checkout
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .ants
          file: .ants/body
          push: true
          tags: ghcr.io/${{ github.repository }}/ant-body:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  working:
    name: 🐜 Ant Mission
    needs: build-image
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      contents: write
      packages: read
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: 🕳️ Descending into the Anthill
        uses: actions/checkout@v6

      - name: 🆔 Pheromone Identification
        id: identify
        shell: bash
        run: |
          SEQUENCE="${{ env.ANT_SEQUENCE }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AGENT_NAME="${{ github.event.inputs.name }}"
            echo "AGENT=$AGENT_NAME" >> $GITHUB_ENV
            echo "📢 Direct call for ant: $AGENT_NAME"
          else
            AUTHOR_NAME=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[-1].commit.author.name')
            if [[ "$AUTHOR_NAME" =~ 🐜\ (.+) ]]; then
              CURRENT_ANT="${BASH_REMATCH[1]}"
              echo "🧬 DNA detected: Ant $CURRENT_ANT merged"

              IFS=',' read -ra ANTS <<< "$SEQUENCE"
              NEXT_ANT=""
              for i in "${!ANTS[@]}"; do
                if [[ "${ANTS[$i]}" == "$CURRENT_ANT" ]]; then
                  NEXT_INDEX=$(( (i + 1) % ${#ANTS[@]} ))
                  NEXT_ANT="${ANTS[$NEXT_INDEX]}"
                  break
                fi
              done

              if [[ -z "$NEXT_ANT" ]]; then
                echo "⚠️ Ant $CURRENT_ANT not in sequence, defaulting to uma"
                NEXT_ANT="uma"
              fi

              echo "AGENT=$NEXT_ANT" >> $GITHUB_ENV
              echo "🔄 Next ant in sequence: $NEXT_ANT"
            else
              echo "👤 Human PR merged — no ant to sequence"
              exit 0
            fi
          fi

      - name: 🛡️ Territory Inspection (PR Limit)
        shell: bash
        run: |
          ANT="${{ env.AGENT }}"
          if [[ -z "$ANT" ]]; then exit 0; fi
          OPEN_PRS=$(gh pr list --state open --repo ${{ github.repository }} --label "ant-$ANT" --json number --jq '. | length')
          if [ "$OPEN_PRS" -ge 2 ]; then
            echo "🚨 Tunnel saturation: $ANT already has $OPEN_PRS active missions."
            exit 1
          fi

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 🐜 Awakening the Drone
        if: env.AGENT != ''
        run: |
          docker run --rm \
            -e ANT="${{ env.AGENT }}" \
            -e ANTS_MODEL="${{ github.event.inputs.model || 'opencode-go/kimi-k2.7-code' }}" \
            -e REPOSITORY="${{ github.repository }}" \
            -e BRANCH="main" \
            -e EMAIL="${{ env.AGENT }}@ants.io" \
            -e GH_TOKEN="${{ github.token }}" \
            -e OPENCODE_API_KEY="${{ secrets.OPENCODE_API_KEY }}" \
            -e BRAVE_API_KEY="${{ secrets.BRAVE_API_KEY }}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/${{ github.repository }}/ant-body:latest

      - name: 📋 Job Summary
        if: always()
        run: |
          echo "## 🐜 Ant Mission Report" >> $GITHUB_STEP_SUMMARY
          echo "**Agent:** ${{ env.AGENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** ${{ github.event.inputs.model || 'opencode-go/kimi-k2.7-code' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: 🏁 Mission Accomplished
        if: env.AGENT != ''
        run: echo "🍂 Collection finished for ${{ env.AGENT }}."
