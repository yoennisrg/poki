name: 🧭 Realign Colony

on:
  workflow_dispatch:
    inputs:
      direction:
        description: 'New direction for the colony'
        required: true
        type: string
      restart_with:
        description: 'Ant to start the new cycle with'
        required: false
        type: string
        default: 'uma'
      model:
        description: 'AI model to use'
        required: false
        type: string
        default: 'opencode-go/kimi-k2.7-code'

jobs:
  build-image:
    name: 🏗️ Build Ant Body
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 🕳️ Checkout
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v5
        with:
          context: .ants
          file: .ants/body
          push: true
          tags: ghcr.io/${{ github.repository }}/ant-body:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  working:
    name: 🐜 Realign Mission
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      contents: write
      packages: read
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 🧭 Awakening with new direction
        run: |
          docker run --rm \
            -e ANT="${{ github.event.inputs.restart_with }}" \
            -e ANTS_MODEL="${{ github.event.inputs.model }}" \
            -e REPOSITORY="${{ github.repository }}" \
            -e BRANCH="main" \
            -e EMAIL="${{ github.event.inputs.restart_with }}@ants.io" \
            -e GH_TOKEN="${{ github.token }}" \
            -e OPENCODE_API_KEY="${{ secrets.OPENCODE_API_KEY }}" \
            -e BRAVE_API_KEY="${{ secrets.BRAVE_API_KEY }}" \
            -e REALIGN_PROMPT="${{ github.event.inputs.direction }}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/${{ github.repository }}/ant-body:latest

      - name: 📋 Job Summary
        if: always()
        run: |
          echo "## 🧭 Realign Mission Report" >> $GITHUB_STEP_SUMMARY
          echo "**Agent:** ${{ github.event.inputs.restart_with }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** ${{ github.event.inputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "**Direction:** ${{ github.event.inputs.direction }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
