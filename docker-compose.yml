services:
  # Production-like container built from the multi-stage Dockerfile
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production

  # Development container with live reload
  dev:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@10.34.4 --activate &&
             pnpm install &&
             pnpm dev --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  node_modules:
